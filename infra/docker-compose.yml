version: "3.9"
services:
  platform-api:
    image: node:22-alpine
    working_dir: /app
    command: ["sh", "-c", "npm run platform:api"]
    volumes:
      - ../:/app
    ports:
      - "4100:4100"
    environment:
      - NODE_ENV=development
      - IAF_SECURITY_BASELINE=nist-800-53

  platform-web:
    image: node:22-alpine
    working_dir: /app
    command: ["sh", "-c", "npm run platform:web"]
    volumes:
      - ../:/app
    ports:
      - "4200:4200"
    environment:
      - NODE_ENV=development
      - API_BASE_URL=http://platform-api:4100
